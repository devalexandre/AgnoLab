services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      WHATSAPP_GATEWAY_BASE_URL: ${WHATSAPP_GATEWAY_BASE_URL:-http://whatsapp:21465}
      WHATSAPP_GATEWAY_SECRET_KEY: ${WHATSAPP_GATEWAY_SECRET_KEY:-agnolab_wppconnect_secret}
      WHATSAPP_WEBHOOK_BASE_URL: ${WHATSAPP_WEBHOOK_BASE_URL:-http://api:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      VITE_DOCKER_POLLING: "true"
      VITE_HMR_CLIENT_PORT: "5173"
      VITE_HMR_HOST: localhost
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

  whatsapp:
    build:
      context: ./infra/wppconnect
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WPPCONNECT_SECRET_KEY: ${WHATSAPP_GATEWAY_SECRET_KEY:-agnolab_wppconnect_secret}
      WPPCONNECT_PORT: "21465"
      WPPCONNECT_HOST: ${WPPCONNECT_HOST:-http://localhost}
    ports:
      - "21465:21465"
    volumes:
      - whatsapp_user_data:/opt/wppconnect-server/userDataDir

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_KRAFT_CLUSTER_ID: MDEyMzQ1Njc4OTAxMjM0NQ
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  sqs:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: "4566"
    ports:
      - "4566:4566"

  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--project=agnolab-local", "--host-port=0.0.0.0:8085"]
    ports:
      - "8085:8085"

volumes:
  web_node_modules:
  whatsapp_user_data:
