services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      WHATSAPP_GATEWAY_BASE_URL: ${WHATSAPP_GATEWAY_BASE_URL:-http://whatsapp:21465}
      WHATSAPP_GATEWAY_SECRET_KEY: ${WHATSAPP_GATEWAY_SECRET_KEY:-agnolab_wppconnect_secret}
      WHATSAPP_WEBHOOK_BASE_URL: ${WHATSAPP_WEBHOOK_BASE_URL:-http://api:8000}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      VITE_DOCKER_POLLING: "true"
      VITE_HMR_CLIENT_PORT: "5173"
      VITE_HMR_HOST: localhost
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

  whatsapp:
    build:
      context: ./infra/wppconnect
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WPPCONNECT_SECRET_KEY: ${WHATSAPP_GATEWAY_SECRET_KEY:-agnolab_wppconnect_secret}
      WPPCONNECT_PORT: "21465"
      WPPCONNECT_HOST: ${WPPCONNECT_HOST:-http://localhost}
    ports:
      - "21465:21465"
    volumes:
      - whatsapp_user_data:/opt/wppconnect-server/userDataDir

volumes:
  web_node_modules:
  whatsapp_user_data:
